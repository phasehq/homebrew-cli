name: Homebrew Tap Validation

on:
  push:
    branches: [main]
    paths:
      - "phase.rb"
  pull_request:
    paths:
      - "phase.rb"

jobs:
  homebrew-tap-validation:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, macos-15, macos-15-intel, macos-26]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Architecture
        run: |
          arch=$(uname -m)
          echo "Running on architecture: $arch"
          if [[ "${{ matrix.os }}" == "macos-15-intel" && "$arch" != "x86_64" ]]; then
            echo "Error: Expected x86_64 architecture for macOS Intel"
            exit 1
          elif [[ "${{ matrix.os }}" =~ "macos-1[45]" && "$arch" != "arm64" ]]; then
            echo "Error: Expected arm64 architecture for ${{ matrix.os }}"
            exit 1
          fi

      - name: Install Homebrew
        run: |
          if ! command -v brew &>/dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          brew update

      - name: Install CLI from local formula (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          brew tap phasehq/cli
          cp ./phase.rb "$(brew --repo phasehq/cli)/phase.rb"
          HOMEBREW_NO_AUTO_UPDATE=1 brew install phasehq/cli/phase

      - name: Install CLI from tap (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          brew install phasehq/cli/phase

      - name: Extract Expected Version
        id: extract-version
        run: |
          version_line=$(grep 'version' phase.rb)
          version=$(echo $version_line | awk -F '"' '{print $2}')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Test CLI Version
        run: |
          echo "Runner architecture:"
          uname -a
          expected_version="${{ steps.extract-version.outputs.version }}"
          installed_version=$(phase --version)
          if [ "$installed_version" != "$expected_version" ]; then
            echo "Version mismatch: expected $expected_version, got $installed_version"
            exit 1
          fi
        shell: bash

  homebrew-upgrade-test:
    name: Upgrade test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [macos-14, macos-15-intel]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Homebrew
        run: |
          if ! command -v brew &>/dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          brew update

      - name: Install old version from published tap
        run: |
          brew install phasehq/cli/phase
          echo "Installed version: $(phase --version)"

      - name: Verify old version is 1.x
        run: |
          version=$(phase --version)
          if [[ ! "$version" =~ ^1\. ]]; then
            echo "Expected 1.x version, got: $version"
            exit 1
          fi
          echo "Old version confirmed: $version"

      - name: Upgrade to new version from PR
        run: |
          cp ./phase.rb "$(brew --repo phasehq/cli)/phase.rb"
          HOMEBREW_NO_AUTO_UPDATE=1 brew upgrade phasehq/cli/phase

      - name: Extract Expected Version
        id: extract-version
        run: |
          version_line=$(grep 'version' phase.rb)
          version=$(echo $version_line | awk -F '"' '{print $2}')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Verify upgrade succeeded
        run: |
          expected="${{ steps.extract-version.outputs.version }}"
          actual=$(phase --version)
          echo "Expected: $expected"
          echo "Actual: $actual"
          if [ "$actual" != "$expected" ]; then
            echo "Version mismatch after upgrade!"
            exit 1
          fi

      - name: Verify old Python artifacts removed
        run: |
          # brew --prefix gives the active (linked) version's prefix
          phase_prefix="$(brew --prefix phasehq/cli/phase)"
          echo "Active prefix: $phase_prefix"
          ls -la "$phase_prefix/bin/"

          if [ -d "$phase_prefix/bin/_internal" ]; then
            echo "ERROR: _internal directory exists in active installation"
            exit 1
          fi
          echo "Active installation has no old Python artifacts"

          # Clean up old versions from the Cellar
          brew cleanup phase
          echo "Cellar after cleanup:"
          ls "$(brew --cellar phase)/"
